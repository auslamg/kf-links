<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loto Experience Links</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap");

      body {
        margin: 0;
        font-family:
          "Montserrat",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
      }

      .container {
        height: 100svh;
        width: calc(100svh * 10 / 16);
        max-width: 100vw;
        flex-shrink: 0;
        box-sizing: border-box;
        color: #ebe0cc;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .top-section {
        width: 100%;
        min-height: clamp(14rem, 32vh, 20rem);
        height: auto;
        padding: clamp(1rem, 2.5vh, 1.75rem) 0;
        box-sizing: border-box;
        background: #636452;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        flex-shrink: 0;
      }

      .content-section {
        flex: 1;
        width: 100%;
        background: url("yogaEdit.jpg") center top / cover no-repeat;
        box-sizing: border-box;
        padding: clamp(1rem, 3vh, 1.5rem) clamp(1rem, 4vw, 1.25rem)
          clamp(1.25rem, 4vh, 2rem);
        text-align: center;
        overflow-y: auto;
      }

      .logo-img {
        width: clamp(10rem, 32vw, 15.625rem);
        height: clamp(10rem, 32vw, 15.625rem);
        border-radius: 50%;
        object-fit: cover;
        border: 0.1875rem solid #ebe0cc;
      }

      h1 {
        margin: 0.625rem 0 0.3125rem;
        font-size: clamp(2rem, 6vw, 3rem);
        font-family: "The Seasons", "Times New Roman", serif;
      }

      p {
        margin: 0 0 1.25rem;
        font-size: clamp(0.8125rem, 2.1vw, 0.875rem);
        opacity: 0.8;
        text-transform: uppercase;
      }

      .link {
        display: block;
        width: 100%;
        max-width: min(60%, 12.5rem);
        box-sizing: border-box;
        background: #ebe0cc;
        color: #111;
        text-decoration: none;
        padding: clamp(0.95rem, 3vw, 1.2rem) clamp(0.75rem, 2.5vw, 1rem);
        margin: 1.625rem auto 1.55rem auto;
        border-radius: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        transition: 0.2s;
      }

      .link:hover {
        transform: scale(1.03);
        background: #eaeaea;
      }

      .footer {
        margin-top: 1.25rem;
        font-size: clamp(0.6875rem, 1.8vw, 0.75rem);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top-section">
        <img src="LogoKarenTrasparent.png" alt="Logo" class="logo-img" />
        <h1>The Loto Experience</h1>
        <!-- <p>Short bio or tagline here</p> -->
      </div>

      <div class="content-section">
        <a href="https://karenflofitness.es/" class="link">Karen Fitness</a>
        <a
          href="https://www.instagram.com/thelotoyogaexperience"
          class="link"
          >Instagram</a
        >
        <a
          href="https://wa.me/34699390286?text=Hola%2C+quiero+informaci%C3%B3n+sobre+los+talleres+y+retiros+de+yoga"
          class="link"
          >WhatsApp</a
        >
        <a href="Retiro.pdf" class="link">Retiro de Yoga</a>

        <!-- <div class="footer">© 2026 The Loto Experience</div> -->
      </div>
    </div>
  </body>
</html>
